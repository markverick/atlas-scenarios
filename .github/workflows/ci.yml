name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Compile all Python files
        run: |
          find . -name '*.py' -not -path './deps/*' -not -path './__pycache__/*' \
            | xargs python3 -m py_compile

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install test dependencies
        run: pip install pytest
      - name: Run tests
        run: python3 -m pytest tests/ -v
